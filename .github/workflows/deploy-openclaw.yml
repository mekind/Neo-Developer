name: Deploy OpenClaw (Vercel)

on:
  push:
    branches: [main]
    paths:
      - 'openclaw/**'
      - '.github/workflows/deploy-openclaw.yml'
  workflow_dispatch:

concurrency:
  group: deploy-openclaw-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_OPENCLAW_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_OPENCLAW_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20.13.1'
          cache: 'pnpm'
          cache-dependency-path: openclaw/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (Next.js)
        run: pnpm build

      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build prebuilt Vercel artifact
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
